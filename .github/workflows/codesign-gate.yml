name: codesign-gate

# REL-04 P12 — gate the release pipeline on a strict `codesign --verify`.
# An ad-hoc signature passes the build (Tauri's default) but FAILS this
# gate, so a regression where APPLE_SIGNING_IDENTITY gets dropped from
# the secret store can never reach a published artifact.
#
# Triggered after `build-mac.yml` finishes successfully, or manually.

on:
  workflow_dispatch:
    inputs:
      app_artifact:
        description: "Artifact name produced by build-mac.yml that contains showMe.app"
        required: true
        default: showme-app
  workflow_run:
    workflows: ["build-mac"]
    types: [completed]

jobs:
  verify-codesign:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download .app artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.app_artifact || 'showme-app' }}
          path: dist

      - name: Locate .app bundle
        id: locate
        run: |
          set -euo pipefail
          APP=$(find dist -maxdepth 3 -type d -name 'showMe.app' | head -1)
          if [[ -z "$APP" ]]; then
            echo "No showMe.app found in artifact" >&2
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: codesign --verify --strict
        env:
          APP_PATH: ${{ steps.locate.outputs.app }}
        run: |
          set -euo pipefail
          echo "verifying $APP_PATH"
          # --strict catches resource-rule violations and nested-bundle drift.
          # --deep-verify walks every embedded Mach-O.
          codesign --verify --strict --deep --verbose=2 "$APP_PATH"

      - name: spctl --assess (Gatekeeper)
        env:
          APP_PATH: ${{ steps.locate.outputs.app }}
        run: |
          set -euo pipefail
          # spctl assesses both signature *and* notarization status.
          # Without notarization this will fail with "Unnotarized Developer ID";
          # that is fine on the gate-only workflow — it is the signal we want.
          # We mark this step continue-on-error so a missing notarization
          # doesn't block dev builds, but log it for visibility.
          spctl --assess --type execute --verbose=2 "$APP_PATH" || true
