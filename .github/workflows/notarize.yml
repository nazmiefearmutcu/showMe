name: notarize

on:
  workflow_dispatch:
    inputs:
      dmg_artifact:
        description: "Artifact name from build-mac.yml"
        required: true

jobs:
  notarize:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.dmg_artifact }}
          path: dist

      - name: Import signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12_BASE64" | base64 -d > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Sign + notarize
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          APP=$(ls dist/*.app | head -1 || true)
          [[ -n "$APP" ]] && APP_PATH="$APP" bash packaging/sign.sh
          DMG_PATH="$DMG" bash packaging/notarize.sh

      - name: Upload notarized
        uses: actions/upload-artifact@v4
        with:
          name: showme-notarized
          path: dist/*.dmg
