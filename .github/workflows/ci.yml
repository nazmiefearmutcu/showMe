name: ci

on:
  push:
    branches: [main]
  pull_request:
  # Agent J 2026-05-23: keep workflow_dispatch as a manual escape hatch
  # for the audit job (still triggered automatically by paths-filter
  # below on PRs that touch UI / engine / audit spec).
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install sidecar deps
        working-directory: backend
        run: uv sync --all-extras
      - name: Lint
        working-directory: backend
        run: uv run ruff check showme
      - name: Pytest (with coverage)
        # Agent J 2026-05-23: pyproject's [tool.pytest.ini_options] addopts
        # injects `--cov=showme --cov-report=term-missing --cov-report=xml`.
        # `--cov-fail-under=60` enforces the gate at CI level without
        # binding local invocations to it.
        working-directory: backend
        run: uv run pytest -q --cov-fail-under=60
      - name: Upload coverage.xml artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: warn
          retention-days: 14

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root + UI deps
        run: npm ci
      - name: Type-check + build UI
        working-directory: ui
        run: |
          npx tsc --noEmit
          npm run build
      - name: Vitest (with coverage)
        # Agent J 2026-05-23: coverage thresholds calibrated in
        # ui/vite.config.ts. Vitest fails the run when global lines /
        # functions / branches / statements dip below the gates.
        working-directory: ui
        run: npm run test:coverage
      - name: Upload UI coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: ui/coverage
          if-no-files-found: warn
          retention-days: 14
      - name: npm audit (production deps only)
        # SEC-09 — fail PRs that introduce a high/critical CVE in the
        # production tree. Dev-only advisories (Vite/Vitest dev-server
        # CORS / path-traversal) are noisy on every install, so we skip
        # the dev tree here and surface them via a separate audit job.
        run: npm audit --omit=dev --audit-level=high

  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri
      - name: Cargo check
        working-directory: tauri
        run: cargo check --all-features
      - name: Cargo test (lib)
        working-directory: tauri
        run: cargo test --lib
      - name: Install cargo-audit
        # SEC-10 — pinned floor; cached via rust-cache so subsequent
        # runs don't re-build it.
        run: cargo install cargo-audit --locked --version "^0.21" || true
      - name: Cargo audit
        working-directory: tauri
        run: cargo audit --deny warnings

  e2e-smoke:
    # TEST-01/03 — wire a fast Playwright smoke spec into PR CI. The
    # full 144-function audit is gated behind a manual `workflow_dispatch`
    # so we don't bog down PRs.
    runs-on: macos-14
    needs: [python, ui, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install root + UI deps
        run: npm ci
      - name: Install sidecar deps
        working-directory: backend
        run: uv sync --all-extras
      - name: Install Playwright + browsers
        working-directory: ui
        run: |
          npx --yes playwright install --with-deps chromium
      - name: Validate playwright config
        run: npx playwright list --config tests/e2e/playwright.config.ts
      # S06 — explicit build step so the smoke project NEVER serves a
      # stale `ui/dist`. The webServer block in playwright.config.ts
      # also chains this build, but a dedicated step surfaces UI build
      # failures in the CI log before Playwright even spins up — much
      # cheaper to triage. SHOWME_E2E_SKIP_BUILD avoids the duplicate
      # rebuild inside webServer.
      - name: Build UI bundle
        run: npm run build:ui
      - name: Run Playwright smoke
        env:
          # The smoke spec stubs all sidecar HTTP and runs against a
          # static `vite preview` so the suite is hermetic in CI.
          PLAYWRIGHT_E2E_MODE: smoke
          SHOWME_E2E_SKIP_BUILD: "1"
        run: npx playwright test --config tests/e2e/playwright.config.ts --project=smoke

  e2e-audit:
    # Agent J 2026-05-23: bring the full 141-function Playwright audit
    # into PR CI when it actually matters. paths-filter restricts the
    # run to PRs that touched UI, sidecar engine, or the audit spec
    # itself — otherwise it remains a manual escape hatch via the
    # `workflow_dispatch` event below. The job also runs on every push
    # to `main` so we always know the latest tip is audit-clean.
    runs-on: macos-14
    needs: [python, ui, rust]
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && (
        contains(toJSON(github.event.pull_request.labels), 'run-audit') ||
        false
      ))
    steps:
      - uses: actions/checkout@v4
      - name: Detect audit-relevant changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            audit:
              - 'ui/**'
              - 'backend/showme/engine/**'
              - 'backend/showme/functions/**'
              - 'tests/e2e/**'
              - '.github/workflows/ci.yml'
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install root + UI deps
        if: steps.filter.outputs.audit == 'true' || github.event_name != 'pull_request'
        run: npm ci
      - name: Install sidecar deps
        if: steps.filter.outputs.audit == 'true' || github.event_name != 'pull_request'
        working-directory: backend
        run: uv sync --all-extras
      - name: Install Playwright + browsers
        if: steps.filter.outputs.audit == 'true' || github.event_name != 'pull_request'
        working-directory: ui
        run: npx --yes playwright install --with-deps chromium
      - name: Build UI bundle
        if: steps.filter.outputs.audit == 'true' || github.event_name != 'pull_request'
        run: npm run build:ui
      - name: Run Playwright audit suite
        if: steps.filter.outputs.audit == 'true' || github.event_name != 'pull_request'
        env:
          # Audit project runs against a live sidecar, not the smoke
          # stub. The webServer block in playwright.config.ts brings
          # the sidecar up under PLAYWRIGHT_E2E_MODE!=smoke.
          SHOWME_E2E_SKIP_BUILD: "1"
        run: npx playwright test --config tests/e2e/playwright.config.ts --project=audit
