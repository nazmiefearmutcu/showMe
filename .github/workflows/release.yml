name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag-style version (e.g. v0.0.2)"
        required: true

jobs:
  bundle:
    runs-on: macos-14
    strategy:
      matrix:
        # Apple Silicon only (backend PyInstaller spec is arm64-locked).
        target: [aarch64-apple-darwin]
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - id: metadata
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${GITHUB_REF##*/v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="${INPUT_VERSION:-0.0.0}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install sidecar deps
        working-directory: backend
        run: uv sync --all-extras

      - name: Build sidecar binary
        run: bash packaging/build_sidecar.sh

      - name: Install root + UI deps
        run: npm ci

      - name: Tauri build (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --config tauri/tauri.conf.json --target ${{ matrix.target }}

      - name: Stage release artifacts
        env:
          TARGET: ${{ matrix.target }}
        run: |
          DEST="release/darwin-aarch64"
          mkdir -p "$DEST"
          cp tauri/target/${TARGET}/release/bundle/dmg/*.dmg "$DEST"/ || true
          # Tauri-signing produces sibling .sig files next to bundles.
          cp tauri/target/${TARGET}/release/bundle/dmg/*.dmg.sig "$DEST"/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release

  publish:
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          path: release-incoming
      - name: Merge artifacts
        run: |
          mkdir -p release
          cp -R release-incoming/release-aarch64-apple-darwin/release/. release/ 2>/dev/null || true

      - name: Build manifest
        env:
          VERSION: ${{ needs.bundle.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # Pick the latest round notes file numerically (round_10 > round_9).
          LATEST_NOTES="$(ls docs/round_notes 2>/dev/null | sort -V | tail -1)"
          python scripts/build_release_manifest.py \
            --release-dir release \
            --version "$VERSION" \
            --notes-file "docs/round_notes/${LATEST_NOTES}" \
            --upload-base "https://github.com/${REPO}/releases/download/v${VERSION}" \
            --out release/latest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.bundle.outputs.version }}
          files: |
            release/**/*.dmg
            release/**/*.dmg.sig
            release/latest.json
