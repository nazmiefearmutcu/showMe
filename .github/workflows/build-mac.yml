name: build-mac

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  bundle:
    runs-on: macos-14
    strategy:
      matrix:
        # Apple Silicon only — backend/showme-backend.spec hardcodes arm64
        # and the PyInstaller --onefile bundle ships an arm64 sidecar binary.
        target: [aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install sidecar deps
        working-directory: backend
        run: uv sync --all-extras

      - name: Build sidecar binary
        run: bash packaging/build_sidecar.sh

      - name: Install root + UI deps
        run: npm ci

      - name: Tauri build
        run: npx tauri build --config tauri/tauri.conf.json --target ${{ matrix.target }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: showme-${{ matrix.target }}
          path: |
            tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
