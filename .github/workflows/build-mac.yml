name: build-mac

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  bundle:
    runs-on: macos-14
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install sidecar
        working-directory: src-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build sidecar binary
        env:
          SHOWME_TBV3_PATH: ${{ github.workspace }}/../TBV3
        run: bash packaging/build_sidecar.sh || echo "skipping sidecar bundle (requires TBV3 checkout)"

      - name: Install UI deps
        working-directory: src-ui
        run: npm install

      - name: Tauri build
        run: |
          npm install --prefix .
          npx tauri build --target ${{ matrix.target }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: showme-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
