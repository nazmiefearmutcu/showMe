# Agent J 2026-05-23: pre-commit hooks for showMe.
#
# Install: `pip install pre-commit && pre-commit install`
# Run on demand: `pre-commit run --all-files`
#
# The ruff-check hook is staged-Python-only by default — the framework
# only forwards staged files to the hook. eslint runs on staged
# TS/TSX. tsc-noEmit runs on the whole UI tree (fast enough at this
# repo's size; switch to tsc-files if it gets slow).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Tauri's Info.plist post-build script preserves a trailing
        # newline contract; exclude binary / vendored trees.
        exclude: ^(node_modules/|backend/.venv/|tauri/target/|backend/showme_backend.egg-info/|artifacts/|ui/dist/|backend/dist/|backend/build/)
      - id: end-of-file-fixer
        exclude: ^(node_modules/|backend/.venv/|tauri/target/|backend/showme_backend.egg-info/|artifacts/|ui/dist/|backend/dist/|backend/build/)
      - id: check-yaml
        # GitHub workflows use the `!reference` tag in a few places; the
        # default loader doesn't understand it. Keep behaviour permissive.
        args: ["--unsafe"]
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      # Backend Python lint — only fires on staged .py files (pre-commit
      # framework handles staged-file filtering). Honours
      # backend/pyproject.toml `[tool.ruff]` config via --config.
      - id: ruff
        name: ruff-check (backend)
        files: ^backend/.*\.py$
        args: ["check", "--config=backend/pyproject.toml"]

  - repo: local
    hooks:
      # UI ESLint on staged TS/TSX. The `--no-warn-ignored` flag stops
      # ESLint exiting non-zero on files outside its config glob.
      - id: eslint-ui
        name: eslint (ui)
        entry: bash -c 'cd ui && npx eslint --no-warn-ignored --max-warnings 0 "$@"' --
        language: system
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: true

      # UI typecheck — runs on the whole tree (fast at our size). If
      # this gets slow, swap to tsc-files for staged-file-only runs.
      - id: ui-typecheck
        name: tsc --noEmit (ui)
        entry: bash -c 'cd ui && npx tsc --noEmit'
        language: system
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false
