active_symbol_path: runtime/active_symbol.txt
auto_scan_enabled: true
auto_scan_interval_seconds: 5   # Cooldown between back-to-back auto-scans (minimal)
auto_select_enabled: true
candle_limit: 500
consensus:
  buy_threshold: 0.30          # 0.40 → 0.30 (audit F.4: total weight 19.6 → 30.4, +55%)
  conflict_ratio_threshold: 0.6
  min_active_signals: 4
  sell_threshold: -0.30        # -0.40 → -0.30
  strong_buy_threshold: 0.95   # 1.20 → 0.95
  strong_sell_threshold: -0.95 # -1.20 → -0.95
cooldown:
  min_candles_between_trades: 3
  reentry_cooldown_seconds: 180
  trade_cooldown_seconds: 60
indicator_thresholds:
  adx_di:
    period: 14
    strong_trend: 25
    weak_trend: 15
  atr:
    high_volatility_multiplier: 2.0
    period: 14
  bollinger:
    period: 20
    squeeze_threshold: 0.02
    std_dev: 2.0
    adx_period: 14            # v2: regime detection
    adx_trend_floor: 20       # v2: above = breakout regime, below = mean-reversion
    high_volume_multiplier: 1.5
  cci:
    buy: -100
    period: 20
    sell: 100
    strong_buy: -200
    strong_sell: 200
  ema_cross:
    long_period: 21
    short_period: 9
    strong_divergence_pct: 0.02
  ichimoku:
    kijun_period: 26
    senkou_b_period: 52
    tenkan_period: 9
  macd:
    fast_period: 12
    signal_period: 9
    slow_period: 26
    strong_histogram_threshold: 0.5
  mfi:
    buy: 30
    period: 14
    sell: 70
    strong_buy: 20
    strong_sell: 80
  obv:
    divergence_lookback: 10
    sma_period: 20
    slope_min_normalized: 0.001  # v2: min normalized price slope for divergence
  psar:
    af_increment: 0.02
    af_max: 0.2
    af_start: 0.02
    weak_distance_pct: 0.5      # v2: <this → NEUTRAL (flip risk)
    strong_distance_pct: 2.0    # v2: ≥this → full strength signal
  roc:
    period: 12
    strong_threshold: 5.0
    weak_threshold: 1.0
  rsi:
    buy: 35
    period: 14
    sell: 65
    strong_buy: 25
    strong_sell: 80
    divergence_lookback: 14    # v2: bars used for divergence detection
  sma_cross:
    long_period: 50
    short_period: 10
    strong_divergence_pct: 0.02
    weak_divergence_pct: 0.005   # v2: below → NEUTRAL when no fresh cross
  stochastic:
    d_period: 3
    k_period: 14
    overbought: 80
    oversold: 20
  williams_r:
    overbought: -20
    oversold: -80
    period: 14
  # ── v2 expansion indicators ──
  supertrend:
    atr_period: 10
    multiplier: 3.0
    confirmation_bars: 3
    flip_buffer_atr: 0.3
  vwap:
    rolling_period: 96
    band_std_1: 1.0
    band_std_2: 2.0
    high_volume_multiplier: 1.5
  cvd:
    cvd_ema_period: 20
    slope_lookback: 5
    divergence_lookback: 10
    divergence_pct_threshold: 0.02
  funding_rate:
    history_days: 30
    z_score_strong: 2.5
    z_score_normal: 1.5
  open_interest:
    period: 1h
    lookback_bars: 5
    strong_threshold_pct: 5.0
    normal_threshold_pct: 2.0
  heikin_ashi:
    confirmation_bars: 3
    strong_confirmation_bars: 5
    doji_atr_ratio: 0.2
  keltner:
    ema_period: 20
    atr_period: 10
    multiplier: 2.0
    bb_period: 20
    bb_std: 2.0
  liquidation_pressure:
    window_minutes: 60
    strong_imbalance_ratio: 3.0
    weak_imbalance_ratio: 1.5
    min_total_notional: 100000.0
indicator_weights:
  adx_di: 1.5
  atr_filter: 0.0
  bollinger: 1.5
  cci: 1.0
  ema_cross: 1.8
  ichimoku: 2.0
  macd: 2.0
  mfi: 1.2
  obv: 1.2
  psar: 1.3
  roc: 1.0
  rsi: 1.5
  sma_cross: 1.8
  stochastic: 1.2
  williams_r: 1.0
  # ── v2 expansion weights (audit G) ──
  supertrend: 1.7
  vwap: 1.5
  cvd: 1.4
  funding_rate: 1.3        # futures-only — registered conditionally
  open_interest: 1.2       # futures-only — registered conditionally
  keltner: 1.3
  heikin_ashi: 1.1
  liquidation_pressure: 1.4   # futures-only — registered when WS cache active
leverage:
  enabled: true
  min_leverage: 2
  scale_ratio: 0.8
log_path: runtime/bot.log
market_type: futures
mode: paper
no_trade:
  adx_min: 15.0
  atr_high_percentile: 95.0
  min_confidence: 30.0
paper:
  fee_pct: 0.001
  starting_balance: 10000.0
polling_interval_seconds: 1
risk:
  break_even_trigger_pct: 0.01
  confidence_threshold: 25
  daily_loss_limit_enabled: false
  daily_loss_limit_pct: 0.05
  max_open_positions: 10
  max_risk_level: MEDIUM
  risk_per_trade: 0.35
  stop_loss_pct: 0.015
  take_profit_pct: 0.03
  trailing_stop_activation_pct: 0.015
  trailing_stop_pct: 0.01
state_path: runtime/state.json
timeframe: 4h
trading_mode: normal
# ── Data pipeline (per plan/20260428_data-pipeline-redesign.md) ──
data_pipeline:
  use_ws_cache: false        # Faz 4 sonrası true; false iken eski REST yolu
  ws_shards: 3
  store_path: runtime/market.db
  bootstrap_months: 24
  agg_trade_retention_days: 30
  ws_symbols_limit: 200      # WS subscription kapasitesi
  rest_fallback_enabled: true
  ccxt_failover_enabled: false
  ccxt_outage_threshold_seconds: 180

